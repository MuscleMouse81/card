<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンバーカード</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; font-family: sans-serif; }
        .card { width: 300px; height: 180px; background: #2c3e50; color: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        .name-area { font-size: 24px; font-weight: bold; margin-top: 50px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div>MEMBER CARD</div>
        <div class="name-area" id="displayName">読み込み中...</div>
    </div>

    <script>
        // URLの「?n=名前」から名前を抜き出して画面に表示する魔法
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('n') || 'ゲスト';
        document.getElementById('displayName').innerText = userName + ' 様';
    </script>
</body>
</html>
